<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuVault — Document Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f2;
  --surface:#ffffff;
  --surface2:#f2f1ed;
  --surface3:#ebe9e3;
  --border:#e0ddd5;
  --border2:#ccc9c0;
  --text:#18170f;
  --muted:#7a7869;
  --muted2:#a09e8e;
  --accent:#1e3a2f;
  --accent2:#2d5843;
  --accent3:#4a8c6e;
  --accent-light:#eaf2ed;
  --danger:#8b2020;
  --danger-light:#fdf0f0;
  --warn:#8b6820;
  --warn-light:#fdf8ec;
  --info:#1a3a6e;
  --info-light:#edf2fd;
  --success:#1e5c35;
  --success-light:#eaf5ee;
  --radius:6px;
  --radius-lg:10px;
  --radius-xl:14px;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;
}
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--accent);letter-spacing:-0.3px}
.sidebar-logo p{font-size:10px;color:var(--muted2);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.co-switcher{padding:10px;border-bottom:1px solid var(--border)}
.co-btn{width:100%;padding:9px 11px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;display:flex;align-items:center;gap:9px;transition:all .15s;text-align:left}
.co-btn:hover{border-color:var(--accent3);background:var(--accent-light)}
.co-avatar{width:28px;height:28px;border-radius:7px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;font-family:var(--font-mono)}
.co-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.co-sub{font-size:10px;color:var(--muted)}
.nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-section{padding:14px 18px 5px;font-size:9px;font-weight:600;letter-spacing:1.5px;color:var(--muted2);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .12s;border-left:2px solid transparent;user-select:none}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--accent);background:var(--accent-light);border-left-color:var(--accent);font-weight:500}
.nav-icon{width:15px;text-align:center;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-item.sub{padding-left:40px;font-size:12px}
.sidebar-bottom{padding:12px 18px;border-top:1px solid var(--border);font-size:10px;color:var(--muted2)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--text)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:28px}

/* BUTTONS */
.btn{padding:7px 15px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-size:12px;font-family:var(--font-body);font-weight:500;transition:all .12s;color:var(--text);line-height:1}
.btn:hover{border-color:var(--accent3);background:var(--surface2);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2);color:#fff}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-danger{color:var(--danger);border-color:#ddd}
.btn-danger:hover{background:var(--danger-light);border-color:var(--danger);color:var(--danger)}

/* CARDS & STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:18px 20px}
.stat-label{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.stat-value{font-family:var(--font-display);font-size:24px;font-weight:600;line-height:1}
.stat-sub{font-size:11px;color:var(--muted2);margin-top:6px}

/* TABLE */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden}
.table-card-header{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.table-card-header h3{font-size:13px;font-weight:600;color:var(--text)}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:9px 16px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border)}
.data-table td{padding:11px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--surface2)}
.empty-state{padding:48px 20px;text-align:center;color:var(--muted);font-size:13px}
.empty-state .es-icon{font-size:36px;margin-bottom:12px;opacity:.4}
.empty-state p{margin-bottom:8px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.badge-paid{background:var(--success-light);color:var(--success)}
.badge-pending{background:var(--warn-light);color:var(--warn)}
.badge-draft{background:var(--surface2);color:var(--muted)}
.badge-sent{background:var(--info-light);color:var(--info)}
.badge-overdue{background:var(--danger-light);color:var(--danger)}
.badge-cancelled{background:var(--surface3);color:var(--muted2)}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.form-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:22px}
.form-section-title{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.field{margin-bottom:13px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:4px;letter-spacing:.2px}
.field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--surface);font-family:var(--font-body);font-size:13px;color:var(--text);outline:none;transition:border .12s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent3);box-shadow:0 0 0 2px rgba(74,140,110,.1)}
.field textarea{resize:vertical;min-height:62px;line-height:1.5}
.field input[type=color]{width:42px;height:32px;padding:2px;cursor:pointer}
.field input[type=date]{cursor:pointer}

/* ITEMS TABLE */
.items-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;margin-bottom:20px}
.items-card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.items-card-header span{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.items-tbl{width:100%;border-collapse:collapse}
.items-tbl th{padding:8px 10px;text-align:left;font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted2);background:var(--surface2);border-bottom:1px solid var(--border)}
.items-tbl td{padding:5px 6px;border-bottom:1px solid var(--border)}
.items-tbl tr:last-child td{border-bottom:none}
.items-tbl td input{width:100%;border:1px solid transparent;padding:6px 8px;border-radius:var(--radius);background:transparent;font-family:var(--font-body);font-size:13px;color:var(--text);outline:none}
.items-tbl td input:focus{border-color:var(--border2);background:var(--surface)}
.item-del{background:none;border:none;cursor:pointer;color:var(--muted2);font-size:18px;padding:2px 7px;border-radius:var(--radius);line-height:1;transition:all .12s}
.item-del:hover{color:var(--danger);background:var(--danger-light)}
.totals-wrap{display:flex;justify-content:flex-end;margin-bottom:20px}
.totals-inner{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:18px 20px;min-width:290px}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.total-row .tlabel{color:var(--muted)}
.total-row .tval{font-family:var(--font-mono);font-size:12px}
.total-row.grand{border-top:1px solid var(--border);margin-top:8px;padding-top:10px;font-weight:600;font-size:15px}
.total-row.grand .tval{font-size:14px;color:var(--accent)}

/* STEP INDICATOR */
.steps-bar{display:flex;align-items:center;gap:0;margin-bottom:28px}
.step-item{display:flex;align-items:center;gap:10px}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;font-family:var(--font-mono);flex-shrink:0;transition:all .2s}
.step-circle.done{background:var(--accent);color:#fff}
.step-circle.current{background:var(--accent);color:#fff;box-shadow:0 0 0 3px var(--accent-light)}
.step-circle.todo{background:var(--surface2);color:var(--muted2);border:1px solid var(--border)}
.step-label{font-size:12px;font-weight:500;color:var(--muted);transition:color .2s}
.step-label.current{color:var(--accent);font-weight:600}
.step-label.done{color:var(--accent2)}
.step-connector{width:40px;height:1px;background:var(--border);margin:0 12px;transition:background .2s}
.step-connector.done{background:var(--accent2)}

/* DOC TYPE GRID */
.doc-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.doc-type-card{padding:15px 12px;border:1.5px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;text-align:center;transition:all .12s}
.doc-type-card:hover{border-color:var(--accent3);background:var(--accent-light)}
.doc-type-card.selected{border-color:var(--accent);background:var(--accent-light)}
.doc-type-card .dtc-icon{font-size:22px;margin-bottom:7px}
.doc-type-card .dtc-label{font-size:12px;font-weight:600;color:var(--accent)}
.doc-type-card .dtc-sub{font-size:10px;color:var(--muted);margin-top:3px}

/* TEMPLATE GRID */
.template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:4px}
.tmpl-card{border:2px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:all .12s;overflow:hidden}
.tmpl-card:hover{border-color:var(--accent3)}
.tmpl-card.selected{border-color:var(--accent)}
.tmpl-thumb{height:80px;background:var(--surface2);position:relative;overflow:hidden}
.tmpl-name{padding:8px 10px;font-size:11px;font-weight:600;color:var(--accent);background:var(--surface);border-top:1px solid var(--border)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border-radius:var(--radius-xl);padding:26px;width:520px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.18)}
.modal-title{font-family:var(--font-display);font-size:17px;font-weight:600;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.tab-nav{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;gap:0}
.tab-nav-item{padding:8px 16px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .12s;margin-bottom:-1px}
.tab-nav-item:hover{color:var(--text)}
.tab-nav-item.active{color:var(--accent);border-bottom-color:var(--accent)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:24px;text-align:center;cursor:pointer;color:var(--muted);font-size:12px;transition:all .15s;background:var(--surface2)}
.upload-zone:hover{border-color:var(--accent3);background:var(--accent-light);color:var(--accent)}
.upload-zone .uz-icon{font-size:28px;margin-bottom:8px;display:block}

/* INVOICE PAPER STYLES */
.preview-bg{background:var(--surface3);padding:28px;display:flex;justify-content:center;min-height:500px}
.invoice-paper{background:#fff;width:100%;max-width:820px;min-height:680px;border:1px solid #d8d5cc;box-shadow:0 2px 16px rgba(0,0,0,.08);font-family:'DM Sans',sans-serif;color:#1a1917}

/* ── TEMPLATE 1: CLASSIC ── */
.tpl-classic .p-head{padding:38px 48px 28px;border-bottom:2.5px solid #1e3a2f}
.tpl-classic .p-head-inner{display:flex;justify-content:space-between;align-items:flex-start}
.tpl-classic .p-co-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1e3a2f;margin-bottom:5px}
.tpl-classic .p-co-info{font-size:11px;color:#7a7869;line-height:1.8}
.tpl-classic .p-doc-type{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:#1e3a2f;text-align:right;letter-spacing:-.5px}
.tpl-classic .p-doc-meta{text-align:right;font-size:11px;color:#7a7869;line-height:2;margin-top:6px}
.tpl-classic .p-body{padding:28px 48px}
.tpl-classic .p-parties{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-bottom:28px}
.tpl-classic .p-party-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#a09e8e;margin-bottom:6px}
.tpl-classic .p-party-name{font-size:14px;font-weight:700;margin-bottom:4px}
.tpl-classic .p-party-info{font-size:11px;color:#7a7869;line-height:1.8}
.tpl-classic .p-items{width:100%;border-collapse:collapse;margin-bottom:20px}
.tpl-classic .p-items th{padding:10px 12px;text-align:left;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;background:#1e3a2f;color:#fff}
.tpl-classic .p-items th:last-child,.tpl-classic .p-items th:nth-child(4){text-align:right}
.tpl-classic .p-items th:nth-child(2),.tpl-classic .p-items th:nth-child(5){text-align:center}
.tpl-classic .p-items td{padding:10px 12px;border-bottom:1px solid #eee;font-size:12px}
.tpl-classic .p-items td:last-child,.tpl-classic .p-items td:nth-child(4){text-align:right;font-family:'DM Mono',monospace}
.tpl-classic .p-items td:nth-child(2),.tpl-classic .p-items td:nth-child(5){text-align:center}
.tpl-classic .p-items tr:last-child td{border-bottom:none}
.tpl-classic .p-totals{display:flex;justify-content:flex-end}
.tpl-classic .p-totals-inner{min-width:230px}
.tpl-classic .p-total-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:#7a7869}
.tpl-classic .p-total-row .tv{font-family:'DM Mono',monospace;font-size:11px}
.tpl-classic .p-total-row.grand{border-top:2px solid #1e3a2f;margin-top:6px;padding-top:10px;font-weight:700;font-size:14px;color:#1e3a2f}
.tpl-classic .p-total-row.grand .tv{font-size:13px}
.tpl-classic .p-footer{padding:20px 48px 28px;border-top:1px solid #eee;margin-top:24px;display:flex;justify-content:space-between;align-items:flex-end}
.tpl-classic .p-notes{font-size:10px;color:#a09e8e;line-height:1.7;max-width:320px}
.tpl-classic .p-sig{text-align:right}
.tpl-classic .p-sig-img{max-height:50px;display:block;margin:0 0 6px auto}
.tpl-classic .p-sig-line{width:160px;border-top:1px solid #1a1917;font-size:10px;color:#a09e8e;padding-top:5px;text-align:center;margin-left:auto}
.tpl-classic .p-logo{max-width:90px;max-height:70px;object-fit:contain;border-radius:4px}
.tpl-classic .p-logo-ph{width:70px;height:70px;background:#eaf2ed;border:2px dashed #c0d8cb;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#1e3a2f;font-family:'DM Mono',monospace}

/* ── TEMPLATE 2: MINIMAL ── */
.tpl-minimal .p-head{padding:40px 52px 24px;display:flex;justify-content:space-between;align-items:flex-start}
.tpl-minimal .p-left{display:flex;align-items:flex-start;gap:14px}
.tpl-minimal .p-logo{max-width:70px;max-height:60px;object-fit:contain}
.tpl-minimal .p-logo-ph{width:60px;height:60px;background:#f2f1ed;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#555;font-family:'DM Mono',monospace}
.tpl-minimal .p-co-name{font-size:14px;font-weight:600;color:#18170f;margin-bottom:3px}
.tpl-minimal .p-co-info{font-size:10px;color:#a09e8e;line-height:1.8}
.tpl-minimal .p-doc-type{font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#a09e8e;margin-bottom:4px}
.tpl-minimal .p-doc-number{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:#18170f;text-align:right}
.tpl-minimal .p-doc-meta{text-align:right;font-size:11px;color:#a09e8e;margin-top:6px;line-height:1.9}
.tpl-minimal .p-stripe{height:2px;background:#1e3a2f;margin:0 52px}
.tpl-minimal .p-body{padding:28px 52px}
.tpl-minimal .p-parties{display:grid;grid-template-columns:1fr 1fr;gap:48px;margin-bottom:32px}
.tpl-minimal .p-party-lbl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#a09e8e;margin-bottom:6px}
.tpl-minimal .p-party-name{font-size:14px;font-weight:600;margin-bottom:3px}
.tpl-minimal .p-party-info{font-size:11px;color:#7a7869;line-height:1.8}
.tpl-minimal .p-items{width:100%;border-collapse:collapse;margin-bottom:20px}
.tpl-minimal .p-items th{padding:10px 0;text-align:left;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#a09e8e;border-bottom:1px solid #e0ddd5}
.tpl-minimal .p-items th:last-child,.tpl-minimal .p-items th:nth-child(4){text-align:right}
.tpl-minimal .p-items th:nth-child(2),.tpl-minimal .p-items th:nth-child(5){text-align:center}
.tpl-minimal .p-items td{padding:11px 0;border-bottom:1px solid #f2f1ed;font-size:12px}
.tpl-minimal .p-items td:last-child,.tpl-minimal .p-items td:nth-child(4){text-align:right;font-family:'DM Mono',monospace}
.tpl-minimal .p-items td:nth-child(2),.tpl-minimal .p-items td:nth-child(5){text-align:center}
.tpl-minimal .p-items tr:last-child td{border-bottom:none}
.tpl-minimal .p-totals{display:flex;justify-content:flex-end}
.tpl-minimal .p-totals-inner{min-width:230px;border-top:1px solid #e0ddd5;padding-top:8px}
.tpl-minimal .p-total-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;color:#7a7869}
.tpl-minimal .p-total-row .tv{font-family:'DM Mono',monospace;font-size:11px}
.tpl-minimal .p-total-row.grand{border-top:1px solid #18170f;margin-top:6px;padding-top:9px;font-weight:700;font-size:14px;color:#18170f}
.tpl-minimal .p-total-row.grand .tv{font-size:13px}
.tpl-minimal .p-footer{padding:24px 52px 32px;margin-top:20px;display:flex;justify-content:space-between;align-items:flex-end}
.tpl-minimal .p-notes{font-size:10px;color:#a09e8e;line-height:1.7;max-width:300px}
.tpl-minimal .p-sig{text-align:right}
.tpl-minimal .p-sig-img{max-height:50px;display:block;margin:0 0 6px auto}
.tpl-minimal .p-sig-line{width:160px;border-top:1px solid #18170f;font-size:10px;color:#a09e8e;padding-top:5px;text-align:center;margin-left:auto}

/* ── TEMPLATE 3: BOLD SIDEBAR ── */
.tpl-sidebar{display:flex;min-height:680px}

<body>
<div class="app">

<!-- ═══════════ SIDEBAR ═══════════ -->
<div class="sidebar">
  <div class="sidebar-logo">
    <h1>DocuVault</h1>
    <p>Document Manager</p>
  </div>
  <div class="co-switcher">
    <button class="co-btn" onclick="openCompanyPicker()">
      <div class="co-avatar" id="hdr-avatar">—</div>
      <div style="flex:1;min-width:0">
        <div class="co-name" id="hdr-co-name">Select Company</div>
        <div class="co-sub">tap to switch</div>
      </div>
      <span style="color:var(--muted2);font-size:12px">↓</span>

  </div>
  <nav class="nav">
    <div class="nav-section">Overview</div>
    <div class="nav-item active" data-page="dashboard" onclick="nav(this)">
      <span class="nav-icon">⊞</span>Dashboard
    </div>
    <div class="nav-section">Create</div>
    <div class="nav-item" data-page="new" onclick="nav(this)">
      <span class="nav-icon">＋</span>New Document
    </div>
    <div class="nav-section">Documents</div>
    <div class="nav-item" data-page="docs" data-filter="" onclick="nav(this)">
      <span class="nav-icon">📄</span>All Documents
    </div>
    <div class="nav-item sub" data-page="docs" data-filter="Invoice" onclick="nav(this)">Invoices</div>
    <div class="nav-item sub" data-page="docs" data-filter="PI" onclick="nav(this)">Proforma Invoices</div>
    <div class="nav-item sub" data-page="docs" data-filter="SO" onclick="nav(this)">Sales Orders</div>
    <div class="nav-item sub" data-page="docs" data-filter="PO" onclick="nav(this)">Purchase Orders</div>
    <div class="nav-item sub" data-page="docs" data-filter="DN" onclick="nav(this)">Delivery Notes</div>
    <div class="nav-item sub" data-page="docs" data-filter="Quote" onclick="nav(this)">Quotations</div>
    <div class="nav-item sub" data-page="docs" data-filter="Credit Note" onclick="nav(this)">Credit Notes</div>
    <div class="nav-section">Setup</div>
    <div class="nav-item" data-page="companies" onclick="nav(this)">
      <span class="nav-icon">🏢</span>Companies
    </div>
  </nav>
  <div class="sidebar-bottom">DocuVault v1.0 &nbsp;·&nbsp; Data saved locally</div>
</div>

<!-- ═══════════ MAIN ═══════════ -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div class="topbar-actions no-print" id="topbar-actions"></div>
  </div>
  <div class="content" id="content"></div>
</div>

</div>

<!-- Modal root -->
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════════
//  STATE & STORAGE
// ═══════════════════════════════════════════════
const ST = {
  companies: [],
  documents: [],
  activeCompany: null,
  page: 'dashboard',
  filter: '',
  editDoc: null,
  step: 1,
  docType: 'Invoice',
  template: 'classic',
  fd: {},
  items: [],
  _tmpLogo: '',
  _tmpSig: ''
};

let isLoading = false;
let apiError = null;

const API_BASE = '/api';

async function apiCall(method, endpoint, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(`${API_BASE}${endpoint}`, opts);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  } catch (e) {
    console.error('API Error:', e);
    // Fallback to localStorage
    apiError = e.message;
    return null;
  }
}

async function loadCompanies() {
  const data = await apiCall('GET', '/companies');
  if (data) ST.companies = data;
  return ST.companies;
}

async function saveCompanyData(company) {
  return await apiCall('POST', '/companies', company);
}

async function deleteCompanyData(id) {
  return await apiCall('DELETE', '/companies', { id });
}

async function loadDocuments(filter) {
  const params = new URLSearchParams(filter);
  const data = await apiCall('GET', `/documents?${params}`);
  if (data) ST.documents = data;
  return ST.documents;
}

async function saveDocumentData(doc) {
  return doc.id ? await apiCall('PUT', '/documents', doc) : await apiCall('POST', '/documents', doc);
}

async function deleteDocumentData(id) {
  return await apiCall('DELETE', '/documents', { id });
}

async function initData() {
  await apiCall('POST', '/init');
}


async function hydrate(){
  isLoading = true;
  apiError = null;
  try {
    await initData();
    await loadCompanies();
    await loadDocuments({});
    // Fallback sync if API fail
    try {
      const d=JSON.parse(localStorage.getItem('dv2025')||'{}');
      if (!ST.companies.length) ST.companies = d.companies || [];
      if (!ST.documents.length) ST.documents = d.documents || [];
      ST.activeCompany = ST.activeCompany || d.activeCompany || null;
    } catch(e) {}
  } finally {
    isLoading = false;
  }
}

async function persist(){
  // Always save local fallback
  try{localStorage.setItem('dv2025',JSON.stringify({companies:ST.companies,documents:ST.documents,activeCompany:ST.activeCompany}));}catch(e){}
}

const DOC_TYPES=[
  {id:'Invoice',label:'Invoice',icon:'🧾',sub:'Tax / commercial invoice'},
  {id:'PI',label:'Proforma Invoice',icon:'📋',sub:'Pre-sale estimate'},
  {id:'SO',label:'Sales Order',icon:'📦',sub:'Confirm a sale'},
  {id:'PO',label:'Purchase Order',icon:'🛒',sub:'Order from supplier'},
  {id:'DN',label:'Delivery Note',icon:'🚚',sub:'Goods dispatch note'},
  {id:'Quote',label:'Quotation',icon:'💬',sub:'Price quotation'},
  {id:'Credit Note',label:'Credit Note',icon:'↩️',sub:'Refund / correction'},
  {id:'Receipt',label:'Receipt',icon:'✅',sub:'Payment receipt'},
  {id:'Statement',label:'Statement',icon:'📊',sub:'Account statement'},
];
const CURRENCIES=['USD','AED','EUR','GBP','SAR','INR','SGD','AUD','CAD','JPY'];
const STATUSES=['draft','sent','pending','paid','overdue','cancelled'];

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function nav(el){
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  const page=el.dataset.page;
  const filter=el.dataset.filter||'';
  ST.page=page; ST.filter=filter;
  const titles={dashboard:'Dashboard',new:'New Document',docs:filter?filter+'s':'All Documents',companies:'Companies',preview:'Document Preview'};
  document.getElementById('page-title').textContent=titles[page]||page;
  renderTopbarActions(page);
  renderPage(page);
}

function navTo(page,filter=''){
  ST.page=page;ST.filter=filter;
  document.querySelectorAll('.nav-item').forEach(i=>i.classList.remove('active'));
  const match=document.querySelector(`.nav-item[data-page="${page}"][data-filter="${filter}"]`);
  if(match)match.classList.add('active');
  const titles={dashboard:'Dashboard',new:'New Document',docs:filter?filter+'s':'All Documents',companies:'Companies',preview:'Document Preview'};
  document.getElementById('page-title').textContent=titles[page]||page;
  renderTopbarActions(page);
  renderPage(page);
}

function renderTopbarActions(page){
  const el=document.getElementById('topbar-actions');
  if(page==='dashboard'||page==='docs'){
    el.innerHTML=`<button class="btn btn-primary" onclick="navTo('new')">＋ New Document</button>`;
  } else if(page==='companies'){
    el.innerHTML=`<button class="btn btn-primary" onclick="showAddCompany()">＋ Add Company</button>`;
  } else if(page==='preview'){
    el.innerHTML=`
      <select class="btn" id="status-sel" onchange="updateStatus()" style="cursor:pointer"></select>
      <button class="btn btn-primary" onclick="window.print()">🖨 Print / PDF</button>
      <button class="btn" onclick="navTo('docs')">← Back</button>`;
  } else {
    el.innerHTML='';
  }
}

function renderPage(page){
  const el=document.getElementById('content');
  if(page==='dashboard')el.innerHTML=renderDashboard();
  else if(page==='new'){el.innerHTML=renderNewDocShell();initNewDoc();}
  else if(page==='docs')el.innerHTML=renderDocList();
  else if(page==='companies')el.innerHTML=renderCompanies();
  else if(page==='preview')renderPreviewPage(el);
}

// ═══════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════
function renderDashboard(){
  const co=activeCo();
  const docs=filteredDocs('');
  const invs=docs.filter(d=>d.type==='Invoice');
  const totAmt=invs.reduce((a,d)=>a+(+d.total||0),0);
  const paidAmt=invs.filter(d=>d.status==='paid').reduce((a,d)=>a+(+d.total||0),0);
  const pending=invs.filter(d=>['pending','sent'].includes(d.status)).length;
  const cur=co?.currency||'USD';
  const recent=[...docs].sort((a,b)=>b.created-a.created).slice(0,10);
  return `
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Documents</div><div class="stat-value">${docs.length}</div><div class="stat-sub">${co?co.name:'All companies'}</div></div>
    <div class="stat-card"><div class="stat-label">Total Invoiced</div><div class="stat-value">${fmtAmt(totAmt,cur)}</div><div class="stat-sub">${invs.length} invoices</div></div>
    <div class="stat-card"><div class="stat-label">Paid</div><div class="stat-value" style="color:var(--success)">${fmtAmt(paidAmt,cur)}</div><div class="stat-sub">${invs.filter(d=>d.status==='paid').length} paid</div></div>
    <div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-value" style="color:var(--warn)">${fmtAmt(totAmt-paidAmt,cur)}</div><div class="stat-sub">${pending} pending</div></div>
  </div>
  <div class="table-card">
    <div class="table-card-header"><h3>Recent Documents</h3><button class="btn btn-sm" onclick="navTo('docs')">View all →</button></div>
    ${recent.length===0?`<div class="empty-state"><div class="es-icon">📄</div><p>No documents yet.</p><p style="font-size:12px">Create your first document to get started.</p></div>`:
    `<table class="data-table"><thead><tr><th>Number</th><th>Type</th><th>Client</th><th>Date</th><th>Amount</th><th>Status</th><th></th></tr></thead>
    <tbody>${recent.map(d=>`<tr>
      <td style="font-family:var(--font-mono);font-size:12px;font-weight:600">${d.number}</td>
      <td>${typePill(d.type)}</td>
      <td>${d.clientName||'—'}</td>
      <td style="font-size:12px;color:var(--muted)">${fmtDate(d.date)}</td>
      <td style="font-family:var(--font-mono);font-size:12px">${fmtAmt(d.total,d.currency)}</td>
      <td>${badge(d.status)}</td>
      <td><button class="btn btn-sm" onclick="viewDoc('${d.id}')">View</button></td>
    </tr>`).join('')}</tbody></table>`}
  </div>`;
}

// ═══════════════════════════════════════════════
//  DOCUMENT LIST
// ═══════════════════════════════════════════════
function renderDocList(){
  const docs=filteredDocs(ST.filter).sort((a,b)=>b.created-a.created);
  return `
  <div class="table-card">
    <div class="table-card-header">
      <h3>${docs.length} ${ST.filter||'Documents'}</h3>
      <input style="padding:6px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:12px;width:200px;font-family:var(--font-body)" placeholder="Search…" oninput="searchDocs(this.value)">
    </div>
    ${docs.length===0?`<div class="empty-state"><div class="es-icon">🔍</div><p>No documents found.</p></div>`:
    `<table class="data-table" id="docs-tbl"><thead><tr><th>Number</th><th>Type</th><th>Client</th><th>Date</th><th>Due Date</th><th>Amount</th><th>Status</th><th></th></tr></thead>
    <tbody>${docs.map(d=>`<tr data-s="${(d.number+d.clientName+d.type).toLowerCase()}">
      <td style="font-family:var(--font-mono);font-size:12px;font-weight:600">${d.number}</td>
      <td>${typePill(d.type)}</td>
      <td>${d.clientName||'—'}</td>
      <td style="font-size:12px;color:var(--muted)">${fmtDate(d.date)}</td>
      <td style="font-size:12px;color:var(--muted)">${fmtDate(d.dueDate)||'—'}</td>
      <td style="font-family:var(--font-mono);font-size:12px">${fmtAmt(d.total,d.currency)}</td>
      <td>${badge(d.status)}</td>
      <td style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="viewDoc('${d.id}')">View</button>
        <button class="btn btn-sm" onclick="cycleStatus('${d.id}')">Status</button>
        <button class="btn btn-sm btn-danger" onclick="delDoc('${d.id}')">Del</button>
      </td>
    </tr>`).join('')}</tbody></table>`}
  </div>`;
}

function searchDocs(q){
  document.querySelectorAll('#docs-tbl tr[data-s]').forEach(r=>{
    r.style.display=r.dataset.s.includes(q.toLowerCase())?'':'none';
  });
}

// ═══════════════════════════════════════════════
//  COMPANIES
// ═══════════════════════════════════════════════
async function renderCompanies(){
  if (isLoading) return `<div style="padding:60px;text-align:center"><div style="font-size:48px;opacity:.4;margin-bottom:20px">⏳</div><p>Loading companies...</p></div>`;
  if (apiError) return `<div class="empty-state"><div class="es-icon">⚠️</div><p>API Error: ${apiError}</p><p>Falling back to local storage.</p><button class="btn btn-primary" onclick="hydrate();renderPage('companies')">Retry</button></div>`;
  if(ST.companies.length===0)return`<div class="empty-state"><div class="es-icon">🏢</div><p>No companies added yet.</p><p style="font-size:12px">Click "Add Company" to get started.</p></div>`;
  return `<div class="co-grid">${ST.companies.map(co=>{
    const isActive=ST.activeCompany===co.id;
    return `<div class="co-card ${isActive?'active-co':''}">
      <div class="co-card-head">
        ${co.logo?`<img src="${co.logo}" class="co-card-logo" alt="">`:
        `<div class="co-card-avatar" style="background:${co.color||'#1e3a2f'}">${co.name.slice(0,2).toUpperCase()}</div>`}
        <div>
          <div class="co-card-name">${co.name}</div>
          <div class="co-card-email">${co.email||'No email set'}</div>
          ${isActive?`<div style="margin-top:5px"><span class="active-badge">✓ Active</span></div>`:''}
        </div>
      </div>
      <div class="co-card-info">
        ${co.address||'No address set'}<br>
        ${co.taxId?'Tax/VAT: '+co.taxId:''}${co.phone?' · '+co.phone:''}
      </div>
      <div class="co-card-actions">
        ${!isActive?`<button class="btn btn-sm btn-primary" onclick="setActiveCo('${co.id}')">Set Active</button>`:''}
        <button class="btn btn-sm" onclick="showAddCompany('${co.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deleteCo('${co.id}')">Delete</button>
      </div>
    </div>`;
  }).join('')}</div>`;
}

async function setActiveCo(id){
  ST.activeCompany=id;
  await persist();
  updateCoHeader();
  if (ST.page === 'companies') await renderPage('companies');
}
async function deleteCo(id){
  if(!confirm('Delete this company?'))return;
  await deleteCompanyData(id);
  ST.companies = ST.companies.filter(c => c.id !== id);
  ST.documents = ST.documents.filter(d => d.companyId !== id);
  if(ST.activeCompany===id)ST.activeCompany=ST.companies[0]?.id||null;
  await persist();
  updateCoHeader();
  renderPage('companies');
}

// ═══════════════════════════════════════════════
//  NEW DOCUMENT WIZARD
// ═══════════════════════════════════════════════
function renderNewDocShell(){
  return `<div style="max-width:840px;margin:0 auto">
    <div class="steps-bar" id="steps-bar">
      ${[['1','Select Type'],['2','Details & Items'],['3','Preview']].map((s,i)=>`
        <div class="step-item">
          <div class="step-circle ${i===0?'current':'todo'}" id="sc-${s[0]}">${s[0]}</div>
          <span class="step-label ${i===0?'current':'todo'}" id="sl-${s[0]}">${s[1]}</span>
          ${i<2?`<div class="step-connector" id="scon-${s[0]}"></div>`:''}
        </div>`).join('')}
    </div>
    <div id="step-body"></div>
  </div>`;
}

function initNewDoc(){
  ST.step=1;ST.docType='Invoice';ST.template='classic';
  ST.items=[{desc:'',qty:1,unit:'pcs',rate:'',tax:0}];
  const co=activeCo();
  const num=genNum('Invoice');
  ST.fd={number:num,date:today(),dueDate:'',currency:co?.currency||'USD',
    clientName:'',clientAddress:'',clientEmail:'',clientTax:'',
    notes:'',terms:'Payment due within 30 days.',discount:0,status:'draft',
    _sub:0,_disc:0,_tax:0,_total:0};
  renderStep(1);
}

function renderStep(n){
  ST.step=n;
  [1,2,3].forEach(i=>{
    const sc=document.getElementById('sc-'+i);
    const sl=document.getElementById('sl-'+i);
    if(!sc)return;
    const done=i<n,cur=i===n;
    sc.className='step-circle '+(done?'done':cur?'current':'todo');
    sl.className='step-label '+(done?'done':cur?'current':'todo');
    if(i<3){const con=document.getElementById('scon-'+i);if(con)con.className='step-connector '+(i<n?'done':'');}
  });
  const body=document.getElementById('step-body');
  if(n===1)body.innerHTML=renderStep1HTML();
  else if(n===2){body.innerHTML=renderStep2HTML();bindItemsTable();}
  else if(n===3)renderStep3(body);
}

function fd(k,v){ST.fd[k]=v;}

function bindItemsTable(){renderItemsBody();calcTotals();}

function renderItemsBody(){
  const body=document.getElementById('items-body');
  if(!body)return;
  body.innerHTML=ST.items.map((it,i)=>`
    <tr>
      <td><input value="${it.desc}" placeholder="Item / service description" oninput="updateItem(${i},'desc',this.value)"></td>
      <td><input type="number" value="${it.qty}" min="0" style="text-align:center" oninput="updateItem(${i},'qty',this.value)"></td>
      <td><input value="${it.unit}" placeholder="pcs" oninput="updateItem(${i},'unit',this.value)"></td>
      <td><input type="number" value="${it.rate}" min="0" placeholder="0.00" style="text-align:right" oninput="updateItem(${i},'rate',this.value)"></td>
      <td><input type="number" value="${it.tax}" min="0" max="100" placeholder="0" style="text-align:center" oninput="updateItem(${i},'tax',this.value)"></td>
      <td style="text-align:right;font-family:var(--font-mono);font-size:12px;padding-right:10px" id="ia-${i}">—</td>
      <td><input type="number" value="${it.disc||0}" min="0" max="100" placeholder="0" style="text-align:center" oninput="updateItem(${i},'disc',this.value)"></td>
      <td><button class="item-del" onclick="removeItem(${i})" title="Remove">×</button></td>
    </tr>`).join('');
  calcTotals();
}

function addItem(){ST.items.push({desc:'',qty:1,unit:'pcs',rate:'',tax:0,disc:0});renderItemsBody();}
function removeItem(i){if(ST.items.length===1)return;ST.items.splice(i,1);renderItemsBody();}
function updateItem(i,k,v){ST.items[i][k]=v;calcTotals();}

function calcTotals(){
  let sub=0,totalTax=0,totalDisc=0;
  ST.items.forEach((it,i)=>{
    const q=+(it.qty)||0,r=+(it.rate)||0,tx=+(it.tax)||0,iDisc=+(it.disc)||0;
    const gross=q*r;
    const itemDisc=gross*(iDisc/100);
    const afterItemDisc=gross-itemDisc;
    sub+=afterItemDisc;
    const lineTax=afterItemDisc*(tx/100);
    totalTax+=lineTax;
    const el=document.getElementById('ia-'+i);
    if(el)el.textContent=fmtN(afterItemDisc);
  });
  const gDisc=sub*(+(ST.fd.discount)||0)/100;
  totalDisc+=gDisc;
  const afterDisc=sub-gDisc;
  const adjTax=totalTax*(afterDisc/(sub||1));
  const total=afterDisc+adjTax;
  ST.fd._sub=sub;ST.fd._disc=totalDisc;ST.fd._tax=adjTax;ST.fd._total=total;
  const cur=ST.fd.currency||'USD';
  const s=document.getElementById('t-sub');if(s)s.textContent=fmtAmt(sub,cur);
  const d=document.getElementById('t-disc');if(d)d.textContent=totalDisc>0?'-'+fmtAmt(totalDisc,cur):'—';
  const x=document.getElementById('t-tax');if(x)x.textContent=adjTax>0?fmtAmt(adjTax,cur):'—';
  const t=document.getElementById('t-total');if(t)t.textContent=fmtAmt(total,cur);
}

function saveAndPreview(){
  if(!ST.fd.clientName.trim()){alert('Please enter a client name.');return;}
  const co=activeCo();
  const doc={
    id:'doc_'+Date.now()+Math.random().toString(36).slice(2,6),
    companyId:ST.activeCompany,
    type:ST.docType,
    template:ST.template,
    number:ST.fd.number,
    date:ST.fd.date,
    dueDate:ST.fd.dueDate,
    ref:ST.fd.ref||'',
    currency:ST.fd.currency,
    clientName:ST.fd.clientName,
    clientAddress:ST.fd.clientAddress,
    clientEmail:ST.fd.clientEmail,
    clientPhone:ST.fd.clientPhone||'',
    clientTax:ST.fd.clientTax,
    notes:ST.fd.notes,
    terms:ST.fd.terms,
    bank:ST.fd.bank||'',
    iban:ST.fd.iban||'',
    swift:ST.fd.swift||'',
    discount:ST.fd.discount,
    status:ST.fd.status,
    items:JSON.parse(JSON.stringify(ST.items)),
    subtotal:ST.fd._sub,
    discountAmt:ST.fd._disc,
    taxAmt:ST.fd._tax,
    total:ST.fd._total,
    created:Date.now(),
    coSnap:co?{...co}:{}
  };
  ST.documents.push(doc);
  ST.editDoc=doc;
  persist();
  renderStep(3);
}

function renderStep3(el){
  const doc=ST.editDoc;
  if(!doc){el.innerHTML='<div class="empty-state">No document to preview.</div>';return;}
  el.innerHTML=`
  <div class="no-print" style="display:flex;gap:10px;margin-bottom:18px;justify-content:flex-end;flex-wrap:wrap">
    <button class="btn" onclick="renderStep(2)">← Edit</button>
    <select class="btn" id="status-sel" onchange="updateStatus()">
      ${STATUSES.map(s=>`<option ${doc.status===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <button class="btn btn-primary" onclick="window.print()">🖨 Print / Save PDF</button>
    <button class="btn" onclick="navTo('docs')">Done ✓</button>
  </div>
  <div class="preview-bg">
    <div class="invoice-paper tpl-${doc.template}">${buildInvoice(doc)}</div>
  </div>`;
}

function viewDoc(id){
  const doc=ST.documents.find(d=>d.id===id);
  if(!doc)return;
  ST.editDoc=doc;
  navTo('preview');
}

function renderPreviewPage(el){
  const doc=ST.editDoc;
  if(!doc){el.innerHTML='<div class="empty-state">No document selected.</div>';return;}
  // populate status select in topbar
  setTimeout(()=>{
    const sel=document.getElementById('status-sel');
    if(sel){sel.innerHTML=STATUSES.map(s=>`<option ${doc.status===s?'selected':''}>${s}</option>`).join('');}
  },0);
  el.innerHTML=`
  <div class="preview-bg">
    <div class="invoice-paper tpl-${doc.template}">${buildInvoice(doc)}</div>
  </div>`;
}

function updateStatus(){
  const sel=document.getElementById('status-sel');
  if(!sel||!ST.editDoc)return;
  const doc=ST.documents.find(d=>d.id===ST.editDoc.id);
  if(doc){doc.status=sel.value;ST.editDoc.status=sel.value;}
  persist();
}

function buildInvoice(doc){
  const co=doc.coSnap||{};
  const t=doc.template||'classic';
  const logoSrc=co.logo||'';
  const sigSrc=co.signature||'';
  const logoHtml=logoSrc?`<img src="${logoSrc}" class="p-logo" alt="logo">`:
    `<div class="p-logo-ph">${(co.name||'?').slice(0,2).toUpperCase()}</div>`;
  const sigHtml=sigSrc?`<img src="${sigSrc}" class="p-sig-img" alt="sig">`:
    `<div style="height:44px;display:flex;align-items:flex-end;justify-content:flex-end;padding-bottom:4px"><span style="font-size:10px;color:#ccc;font-style:italic">Signature</span></div>`;
  const itemRows=(doc.items||[]).map(it=>{
    const q=+(it.qty)||0,r=+(it.rate)||0,tx=+(it.tax)||0,iDisc=+(it.disc)||0;
    const gross=q*r,disc=gross*(iDisc/100),amt=gross-disc;
    return `<tr>
      <td>${it.desc||'—'}</td>
      <td style="text-align:center">${q}</td>
      <td>${it.unit||''}</td>
      <td style="text-align:right">${fmtN(r)}</td>
      <td style="text-align:center">${tx>0?tx+'%':'—'}</td>
      <td style="font-weight:600">${fmtN(amt)}</td>
    </tr>`;
  }).join('');
  const totalsHtml=`
    <div class="p-total-row"><span class="tlabel">Subtotal</span><span class="tv">${fmtAmt(doc.subtotal,doc.currency)}</span></div>
    ${(doc.discountAmt>0)?`<div class="p-total-row"><span class="tlabel">Discount</span><span class="tv">−${fmtAmt(doc.discountAmt,doc.currency)}</span></div>`:''}
    ${(doc.taxAmt>0)?`<div class="p-total-row"><span class="tlabel">Tax</span><span class="tv">${fmtAmt(doc.taxAmt,doc.currency)}</span></div>`:''}
    <div class="p-total-row grand"><span>Total</span><span class="tv">${fmtAmt(doc.total,doc.currency)}</span></div>`;
  const bankInfo=(doc.bank||doc.iban)?`Bank: ${doc.bank||''}${doc.iban?' · IBAN: '+doc.iban:''}${doc.swift?' · SWIFT: '+doc.swift:''}`:'';
  const coInfo=[co.address,co.email,co.phone,co.taxId?'Tax: '+co.taxId:''].filter(Boolean).join(' · ');

  if(t==='classic') return `
    <div class="p-head">
      <div class="p-head-inner">
        <div style="display:flex;align-items:flex-start;gap:16px">
          ${logoHtml}
          <div>
            <div class="p-co-name">${co.name||'Your Company'}</div>
            <div class="p-co-info">${[co.address,co.email,co.phone].filter(Boolean).join('<br>')}<br>${co.taxId?'Tax/VAT: '+co.taxId:''}</div>
          </div>
        </div>
        <div>
          <div class="p-doc-type">${doc.type.toUpperCase()}</div>
          <div class="p-doc-meta"># ${doc.number}${doc.ref?'<br>Ref: '+doc.ref:''}<br>Date: ${fmtDate(doc.date)}${doc.dueDate?'<br>Due: '+fmtDate(doc.dueDate):''}<br>${doc.currency}</div>
        </div>
      </div>
    </div>
    <div class="p-body">
      <div class="p-parties">
        <div><div class="p-party-lbl">From</div><div class="p-party-name">${co.name||''}</div><div class="p-party-info">${co.address||''}</div></div>
        <div><div class="p-party-lbl">Bill To</div><div class="p-party-name">${doc.clientName}</div><div class="p-party-info">${doc.clientAddress||''}${doc.clientEmail?'<br>'+doc.clientEmail:''}${doc.clientPhone?'<br>'+doc.clientPhone:''}${doc.clientTax?'<br>Tax: '+doc.clientTax:''}</div></div>
      </div>
      <table class="p-items"><thead><tr><th>Description</th><th style="text-align:center">Qty</th><th>Unit</th><th style="text-align:right">Price</th><th style="text-align:center">Tax</th><th style="text-align:right">Amount</th></tr></thead><tbody>${itemRows}</tbody></table>
      <div class="p-totals"><div class="p-totals-inner">${totalsHtml}</div></div>
    </div>
    <div class="p-footer">
      <div class="p-notes">${doc.notes?doc.notes+'<br><br>':''}<em>${doc.terms||''}</em>${bankInfo?'<br><br>'+bankInfo:''}</div>
      <div class="p-sig">${sigHtml}<div class="p-sig-line">Authorised Signature</div></div>

      <div class="p-left">${logoHtml}<div><div class="p-co-name">${co.name||'Your Company'}</div><div class="p-co-info">${[co.address,co.email,co.phone].filter(Boolean).join('<br>')}</div></div></div>

      <div class="p-side-item"><div class="p-side-lbl">Currency</div><div class="p-side-val">${doc.currency}</div></div>
      <div class="p-side-item"><div class="p-side-lbl">Status</div><div class="p-side-val" style="text-transform:capitalize">${doc.status}</div></div>
      ${doc.ref?`<div class="p-side-item"><div class="p-side-lbl">Reference</div><div class="p-side-val">${doc.ref}</div></div>`:''}
      ${doc.clientTax?`<div class="p-side-item"><div class="p-side-lbl">Client Tax</div><div class="p-side-val">${doc.clientTax}</div></div>`:''}
      ${co.taxId?`<div class="p-side-item"><div class="p-side-lbl">Our Tax/VAT</div><div class="p-side-val">${co.taxId}</div></div>`:''}
      <div class="p-side-total"><div class="p-side-total-lbl">Total Amount</div><div class="p-side-total-val">${fmtAmt(doc.total,doc.currency)}</div></div>
    </div>
    <div class="p-main">
      <div class="p-co-name">${co.name||'Your Company'}</div>
      <div class="p-co-info">${[co.address,co.email,co.phone].filter(Boolean).join(' · ')}</div>
      <div class="p-parties">
        <div><div class="p-party-lbl">Bill To</div><div class="p-party-name">${doc.clientName}</div><div class="p-party-info">${doc.clientAddress||''}${doc.clientEmail?'<br>'+doc.clientEmail:''}${doc.clientPhone?'<br>'+doc.clientPhone:''}</div></div>
        <div></div>
      </div>
      <table class="p-items"><thead><tr><th>Description</th><th style="text-align:center">Qty</th><th>Unit</th><th style="text-align:right">Price</th><th style="text-align:center">Tax</th><th style="text-align:right">Amount</th></tr></thead><tbody>${itemRows}</tbody></table>
      <div class="p-footer">
        <div class="p-notes">${doc.notes?doc.notes+'<br><br>':''}<em style="font-size:9px">${doc.terms||''}</em>${bankInfo?'<br><br>'+bankInfo:''}</div>
        <div class="p-sig">${sigHtml}<div class="p-sig-line">Authorised Signature</div></div>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════
//  COMPANY MODAL
// ═══════════════════════════════════════════════
function openCompanyPicker(){
  const html=`<div class="modal-overlay" onclick="if(this===event.target)closeModal()">
    <div class="modal" style="width:420px">
      <div class="modal-title">Switch Company</div>
      ${ST.companies.length===0?`<div style="color:var(--muted);font-size:13px;margin-bottom:16px;text-align:center;padding:20px">No companies yet.</div>`:
      ST.companies.map(co=>`
        <div onclick="setActiveCo('${co.id}');closeModal()" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid ${ST.activeCompany===co.id?'var(--accent)':'var(--border)'};border-radius:var(--radius-lg);margin-bottom:8px;cursor:pointer;background:${ST.activeCompany===co.id?'var(--accent-light)':'var(--surface)'};transition:all .12s">
          ${co.logo?`<img src="${co.logo}" style="width:36px;height:36px;border-radius:6px;object-fit:contain;border:1px solid var(--border)">`:
          `<div style="width:36px;height:36px;border-radius:6px;background:${co.color||'var(--accent)'};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:var(--font-mono)">${co.name.slice(0,2).toUpperCase()}</div>`}
          <div style="flex:1">
            <div style="font-size:13px;font-weight:600">${co.name}</div>
            <div style="font-size:11px;color:var(--muted)">${co.email||''}</div>
          </div>
          ${ST.activeCompany===co.id?`<span style="font-size:10px;font-weight:700;color:var(--accent)">ACTIVE</span>`:''}
        </div>`).join('')}
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="closeModal();showAddCompany()">＋ Add Company</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-root').innerHTML=html;
}

function showAddCompany(editId){
  const ex=editId?ST.companies.find(c=>c.id===editId):{};
  ST._tmpLogo=ex?.logo||'';ST._tmpSig=ex?.signature||'';
  const html=`<div class="modal-overlay" onclick="if(this===event.target)closeModal()">
    <div class="modal">
      <div class="modal-title">${editId?'Edit':'Add'} Company</div>
      <div class="tab-nav">
        <div class="tab-nav-item active" onclick="switchTab(this,'ct1')">Details</div>
        <div class="tab-nav-item" onclick="switchTab(this,'ct2')">Logo & Signature</div>
        <div class="tab-nav-item" onclick="switchTab(this,'ct3')">Bank & Legal</div>
      </div>
      <div id="ct1">
        <div class="field"><label>Company Name *</label><input id="cn" value="${ex?.name||''}" placeholder="e.g. Acme Trading LLC"></div>
        <div class="field"><label>Email</label><input id="ce" type="email" value="${ex?.email||''}" placeholder="info@company.com"></div>
        <div class="field"><label>Phone</label><input id="cp" value="${ex?.phone||''}" placeholder="+971 4 000 0000"></div>
        <div class="field"><label>Address</label><textarea id="ca" placeholder="Street, City, Country, ZIP">${ex?.address||''}</textarea></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="field"><label>Default Currency</label><select id="cc">${CURRENCIES.map(c=>`<option ${ex?.currency===c?'selected':''}>${c}</option>`).join('')}</select></div>
          <div class="field"><label>Brand Color</label><input type="color" id="ccol" value="${ex?.color||'#1e3a2f'}"></div>
        </div>
        <div class="field"><label>Website</label><input id="cw" value="${ex?.website||''}" placeholder="www.company.com"></div>
      </div>
      <div id="ct2" style="display:none">
        <div class="field">
          <label>Company Logo</label>
          <div class="upload-zone" onclick="document.getElementById('fl').click()">
            <div id="logo-pa">${ST._tmpLogo?`<img src="${ST._tmpLogo}" style="max-width:140px;max-height:90px;object-fit:contain;border-radius:4px">`:
            `<span class="uz-icon">🏢</span><div>Click to upload logo</div><div style="font-size:10px;margin-top:4px;color:var(--muted2)">PNG, JPG, SVG · max 2MB</div>`}</div>
          </div>
          <input type="file" id="fl" accept="image/*" style="display:none" onchange="handleImg(this,'logo')">
        </div>
        <div class="field" style="margin-top:16px">
          <label>Signature Image</label>
          <div class="upload-zone" onclick="document.getElementById('fs').click()">
            <div id="sig-pa">${ST._tmpSig?`<img src="${ST._tmpSig}" style="max-height:70px;object-fit:contain">`:
            `<span class="uz-icon">✍️</span><div>Click to upload signature</div><div style="font-size:10px;margin-top:4px;color:var(--muted2)">PNG with transparent background ideal</div>`}</div>
          </div>
          <input type="file" id="fs" accept="image/*" style="display:none" onchange="handleImg(this,'sig')">
        </div>
      </div>
      <div id="ct3" style="display:none">
        <div class="field"><label>Tax / VAT Number</label><input id="ctx" value="${ex?.taxId||''}" placeholder="e.g. TRN100234567890003"></div>
        <div class="field"><label>Company Registration No.</label><input id="crn" value="${ex?.regNo||''}" placeholder="Registration number"></div>
        <div class="field"><label>Bank Name</label><input id="cbn" value="${ex?.bank||''}" placeholder="e.g. Emirates NBD"></div>
        <div class="field"><label>Account Number / IBAN</label><input id="cib" value="${ex?.iban||''}" placeholder="AE12 3456 7890 1234 5678 90"></div>
        <div class="field"><label>SWIFT / BIC</label><input id="csw" value="${ex?.swift||''}" placeholder="EBILAEAD"></div>
        <div class="field"><label>Industry / Sector</label><input id="cin" value="${ex?.industry||''}" placeholder="e.g. Trading, Consulting"></div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCo('${editId||''}')">Save Company</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modal-root').innerHTML=html;
}

function switchTab(el,show){
  document.querySelectorAll('.tab-nav-item').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['ct1','ct2','ct3'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display=id===show?'block':'none';});
}

function handleImg(inp,type){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const src=e.target.result;
    if(type==='logo'){ST._tmpLogo=src;const pa=document.getElementById('logo-pa');if(pa)pa.innerHTML=`<img src="${src}" style="max-width:140px;max-height:90px;object-fit:contain;border-radius:4px">`;}
    else{ST._tmpSig=src;const pa=document.getElementById('sig-pa');if(pa)pa.innerHTML=`<img src="${src}" style="max-height:70px;object-fit:contain">`;}
  };r.readAsDataURL(f);
}

function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function saveCo(editId){
  const name=gv('cn').trim();
  if(!name){alert('Company name is required.');return;}
  const co={
    id:editId||'co_'+Date.now(),name,
    email:gv('ce'),phone:gv('cp'),address:gv('ca'),
    currency:gv('cc'),color:gv('ccol'),website:gv('cw'),
    taxId:gv('ctx'),regNo:gv('crn'),bank:gv('cbn'),iban:gv('cib'),swift:gv('csw'),industry:gv('cin'),
    logo:ST._tmpLogo,signature:ST._tmpSig
  };
  if(editId){const i=ST.companies.findIndex(c=>c.id===editId);if(i>=0)ST.companies[i]=co;}
  else ST.companies.push(co);
  if(!ST.activeCompany)ST.activeCompany=co.id;
  persist();closeModal();updateCoHeader();
  if(ST.page==='companies')renderPage('companies');
}

function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ═══════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════
function activeCo(){return ST.companies.find(c=>c.id===ST.activeCompany)||null;}
function filteredDocs(filter){
  return ST.documents.filter(d=>
    (!ST.activeCompany||d.companyId===ST.activeCompany)&&
    (!filter||d.type===filter)
  );
}
function updateCoHeader(){
  const co=activeCo();
  const av=document.getElementById('hdr-avatar');
  const nm=document.getElementById('hdr-co-name');
  if(co){
    av.textContent=co.name.slice(0,2).toUpperCase();
    av.style.background=co.color||'var(--accent)';
    nm.textContent=co.name;
  } else {
    av.textContent='—';av.style.background='var(--accent)';nm.textContent='Select Company';
  }
}
function genNum(type){
  const p={Invoice:'INV',PI:'PI',SO:'SO',PO:'PO',DN:'DN',Quote:'QT','Credit Note':'CN',Receipt:'RCP',Statement:'STM'};
  const pre=p[type]||'DOC';
  const y=new Date().getFullYear();
  const n=ST.documents.filter(d=>d.type===type).length+1;
  return `${pre}-${y}-${String(n).padStart(4,'0')}`;
}
function today(){return new Date().toISOString().split('T')[0];}
function fmtDate(s){
  if(!s)return '';
  try{const d=new Date(s+'T00:00:00');return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return s;}
}
function fmtN(n){return (Math.round((parseFloat(n)||0)*100)/100).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtAmt(n,cur){return `${cur||'USD'} ${fmtN(n||0)}`;}
function badge(s){
  const m={paid:'badge-paid',pending:'badge-pending',draft:'badge-draft',sent:'badge-sent',overdue:'badge-overdue',cancelled:'badge-cancelled'};
  return `<span class="badge ${m[s]||'badge-draft'}">${s||'draft'}</span>`;
}
function typePill(t){return `<span style="font-size:10px;padding:2px 8px;border-radius:20px;background:var(--surface2);color:var(--muted);font-weight:500">${t}</span>`;}
function cycleStatus(id){
  const doc=ST.documents.find(d=>d.id===id);if(!doc)return;
  const i=STATUSES.indexOf(doc.status);doc.status=STATUSES[(i+1)%STATUSES.length];
  persist();renderPage(ST.page);
}
function delDoc(id){
  if(!confirm('Delete this document permanently?'))return;
  ST.documents=ST.documents.filter(d=>d.id!==id);persist();renderPage(ST.page);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
hydrate();
updateCoHeader();
renderTopbarActions('dashboard');
renderPage('dashboard');
</script>
</body>
</html>
